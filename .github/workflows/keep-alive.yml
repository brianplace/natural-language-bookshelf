name: Keep Alive

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Ping API
        run: curl --fail ${{ secrets.NEXT_PUBLIC_API_URL }}/health

      - name: Ping MCP
        run: curl --fail ${{ secrets.MCP_URL }}/health
